<style>

body{
  margin:0;

  background: linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  text-align:center;
}

.box{
  background:rgba(255,255,255,0.05);

  border-radius:20px;

  animation:pop 0.6s ease;
}

@keyframes pop{
  0%{transform:scale(0)}
  80%{transform:scale(1.2)}
  100%{transform:scale(1)}
}

h1{
  margin-bottom:10px;
  font-size:26px;
}

p{
  color:#cbd5e1;
  margin-bottom:25px;
}

.btn{
  display:block;
  text-decoration:none;
  padding:14px;
  border-radius:30px;
  margin:10px 0;
  font-weight:bold;
}

.home{
  background:#e60000;
  color:white;
}

.wa{
  background:#25d366;
  color:white;
}

.call{
  background:#0f9d8a;
  color:white;
}

.btn:hover{
  transform:scale(1.03);
}

</style>
</head>
