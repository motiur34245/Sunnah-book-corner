<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Safe Bd</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --primary: #b8860b;
      --primary-dark: #9c6f00;
      --primary-light: #d4a040;
      --accent: #1a1a1a;
      --bg: #f8f9fc;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --gray: #6b7280;
      --shadow: 0 8px 30px rgba(0,0,0,0.08);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --gray: #94a3b8;
      --shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: var(--transition);
      padding: 0;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .top-header {
      background: linear-gradient(135deg, #1a1a2e, #2d2d44);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      position: sticky;
      top: 0;
      z-index: 999;
      backdrop-filter: blur(10px);
    }
    .menu-icon { font-size: 22px; cursor: pointer; color: #fff; transition: var(--transition); }
    .menu-icon:hover { transform: scale(1.1); }
    .logo { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: 1px; }
    .logo span { color: var(--primary); }
    .header-icons { display: flex; align-items: center; gap: 18px; font-size: 19px; color: #fff; }
    .header-icons i { cursor: pointer; transition: var(--transition); }
    .header-icons i:hover { color: var(--primary); transform: scale(1.1); }
    .cart-icon { position: relative; }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #e60000;
      color: #fff;
      font-size: 10px;
      width: 19px;
      height: 19px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(230,0,0,0.3);
    }

    /* ===== SEARCH ===== */
    .search-box {
      display: none;
      padding: 14px 18px;
      background: var(--card-bg);
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .search-box input {
      width: 100%;
      padding: 12px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 30px;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: var(--transition);
    }
    .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(184,134,11,0.1); }

    /* ===== LOADING ===== */
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60vh;
      font-size: 20px;
      color: var(--primary);
      gap: 14px;
      flex-direction: column;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 6px solid #e5e7eb;
      border-top: 6px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .not-found i { font-size: 64px; color: var(--gray); margin-bottom: 20px; }
    .not-found h2 { font-size: 28px; margin-bottom: 10px; }

    /* ===== PRODUCT DETAIL ===== */
    .product-detail {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 14px 30px;
    }
    .product-image-wrapper {
      width: 100%;
      aspect-ratio: 1/1;
      background: #f8f9fa;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: var(--shadow);
    }
    .product-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .discount-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: linear-gradient(135deg, var(--primary), #e60000);
      color: #fff;
      padding: 6px 14px;
      font-weight: 700;
      border-radius: 50px;
      font-size: 0.75rem;
      box-shadow: 0 4px 12px rgba(184,134,11,0.3);
      z-index: 2;
    }
    .thumb-gallery {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 12px 0;
      scrollbar-width: thin;
    }
    .thumb-gallery .thumb-wrapper {
      width: 70px;
      height: 70px;
      flex-shrink: 0;
      border-radius: 10px;
      border: 2px solid #e5e7eb;
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-gallery .thumb-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .thumb-gallery .thumb-wrapper:hover { border-color: var(--primary); transform: scale(1.05); }
    .thumb-gallery .thumb-wrapper.active-thumb { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(184,134,11,0.2); }

    .product-name {
      font-size: 22px;
      font-weight: 700;
      margin: 10px 0 4px;
    }
    .price-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 6px 0;
    }
    .current-price { font-size: 26px; font-weight: 800; color: #e60000; }
    .old-price {
      color: var(--gray);
      text-decoration: line-through;
      font-size: 18px;
    }
    .product-desc {
      background: var(--bg);
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.7;
      margin: 10px 0 16px;
      color: var(--text);
    }

    .checkout-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 16px;
      margin: 10px 0;
    }
    .checkout-box .delivery-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .qty-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
    }
    .qty-row label { font-weight: 600; font-size: 15px; }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-control button {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid #e5e7eb;
      background: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }
    .qty-control button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .qty-control input {
      width: 56px;
      padding: 6px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 17px;
      text-align: center;
      font-weight: 700;
      background: #fff;
      color: var(--text);
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 19px;
      font-weight: 700;
      border-top: 2px dashed #e5e7eb;
      padding-top: 12px;
      margin-top: 8px;
    }
    .total-row .total-price { color: #e60000; font-size: 22px; }

    .order-form-container {
      margin-top: 14px;
      padding: 16px;
      background: var(--bg);
      border-radius: 12px;
    }
    .order-form-container h3 {
      color: var(--primary);
      margin-bottom: 12px;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .order-form-container input,
    .order-form-container textarea {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 10px;
      background: #fff;
      color: var(--text);
      font-family: inherit;
      transition: var(--transition);
    }
    .order-form-container input:focus,
    .order-form-container textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 4px rgba(184,134,11,0.08);
    }
    .order-form-container textarea { min-height: 65px; resize: vertical; }

    .btn-submit-order {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-submit-order:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,197,94,0.3); }

    .extra-order-buttons {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .extra-order-buttons a {
      text-decoration: none;
      padding: 13px;
      border-radius: 50px;
      font-weight: 600;
      text-align: center;
      font-size: 14px;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: var(--transition);
    }
    .extra-order-buttons a:hover { transform: scale(1.02); }
    .wa-btn { background: #25d366; }
    .ms-btn { background: #1877f2; }
    .call-btn { background: #0f9d8a; }

    /* ===== FOOTER ===== */
    .footer {
      background: linear-gradient(135deg, #1a1a2e, #2d2d44);
      color: #fff;
      padding: 40px 20px 20px;
      margin-top: 20px;
      width: 100%;
    }
    .footer-container {
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
    }
    .footer h3 { margin-bottom: 14px; font-size: 18px; color: var(--primary); }
    .footer p { margin-bottom: 8px; font-size: 14px; color: #ccc; }
    .footer p i { width: 22px; color: var(--primary); }
    .footer a { color: #ccc; text-decoration: none; transition: var(--transition); }
    .footer a:hover { color: #fff; }
    .social-icons { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
    .social-icons a {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      font-size: 18px;
      transition: var(--transition);
    }
    .social-icons a:hover { transform: scale(1.1); background: var(--primary); }
    .footer-bottom {
      text-align: center;
      margin-top: 30px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
      color: #888;
    }

    .theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card-bg);
      color: var(--text);
      border: 2px solid var(--primary);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: var(--shadow);
      z-index: 99;
      transition: var(--transition);
    }
    .theme-toggle:hover { transform: scale(1.1) rotate(20deg); background: var(--primary); color: #fff; }

    @media (max-width: 768px) {
      .product-detail { padding: 12px 12px 20px; }
      .product-name { font-size: 19px; }
      .current-price { font-size: 22px; }
      .thumb-gallery .thumb-wrapper { width: 55px; height: 55px; }
    }
  </style>
</head>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCa3qjuHUkFJwOEv1Cbp-E0AIkihCW4zKY",
  authDomain: "sunnah-book-corner.firebaseapp.com",
  projectId: "sunnah-book-corner",
  storageBucket: "sunnah-book-corner.firebasestorage.app",
  messagingSenderId: "728093683205",
  appId: "1:728093683205:web:198063ce6b85f07adeb66c"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedProduct = null;
let currentQty = 1;

// Get product ID from URL
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');

const loadingEl = document.getElementById('loadingSpinner');
const container = document.getElementById('productContainer');
const notFound = document.getElementById('notFound');

async function loadProduct() {
  if (!productId) {
    loadingEl.style.display = 'none';
    notFound.style.display = 'block';
    return;
  }

  try {
    const docRef = doc(db, 'products', productId);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
      loadingEl.style.display = 'none';
      notFound.style.display = 'block';
      return;
    }

    const data = docSnap.data();
    let images = [];
    if (data.images && Array.isArray(data.images)) {
      images = data.images;
    } else if (data.image) {
      images = [data.image];
    }

    selectedProduct = {
      docId: docSnap.id,
      ...data,
      images
    };

    loadingEl.style.display = 'none';
    container.style.display = 'block';
    renderProduct(selectedProduct);

  } catch (err) {
    console.error('Error loading product:', err);
    loadingEl.style.display = 'none';
    notFound.style.display = 'block';
  }
}

function renderProduct(product) {
  const oldPrice = Math.round(product.price / (1 - product.discount / 100));

  let html = `
    <div class="product-detail">
      <div class="product-image-wrapper">
        <img id="mainProductImage" src="${product.images[0] || ''}" alt="${product.name}">
        <div class="discount-badge">-${product.discount}%</div>
      </div>

      <div class="thumb-gallery" id="thumbGallery">
  `;

  product.images.forEach((img, idx) => {
    html += `
      <div class="thumb-wrapper ${idx === 0 ? 'active-thumb' : ''}" data-img="${img}">
        <img src="${img}" alt="thumbnail">
      </div>
    `;
  });

  html += `
      </div>

      <h1 class="product-name">${product.name}</h1>
      <div class="price-row">
        <span class="current-price">৳ ${product.price}</span>
        <span class="old-price">৳ ${oldPrice}</span>
      </div>

      <div class="product-desc">${product.description || ''}</div>

      <div class="checkout-box">
        <div class="delivery-badge"><i class="fas fa-truck"></i> হোম ডেলিভারি</div>
        <div class="qty-row">
          <label>পরিমাণ:</label>
          <div class="qty-control">
            <button onclick="changeQty(-1)">−</button>
            <input type="number" id="productQty" value="1" min="1" max="99" readonly>
            <button onclick="changeQty(1)">+</button>
          </div>
        </div>
        <div class="total-row">
          <span>মোট দাম:</span>
          <span class="total-price" id="totalPriceDisplay">৳ ${product.price}</span>
        </div>
      </div>

      <div class="order-form-container">
        <h3><i class="fas fa-clipboard-list"></i> অর্ডার ফর্ম</h3>
        <input type="text" id="orderName" placeholder="আপনার নাম *">
        <input type="tel" id="orderPhone" placeholder="মোবাইল নম্বর *">
        <textarea id="orderAddress" placeholder="বিস্তারিত ঠিকানা *"></textarea>
        <button class="btn-submit-order" id="submitOrderBtn">
          <i class="fas fa-check-circle"></i> অর্ডার কনফার্ম করুন
        </button>
      </div>

      <div class="extra-order-buttons">
        <a href="https://wa.me/8801770019872" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i> WhatsApp এ অর্ডার করুন</a>
        <a href="https://m.me/yourpageusername" target="_blank" class="ms-btn"><i class="fab fa-facebook-messenger"></i> Messenger এ অর্ডার করুন</a>
        <a href="tel:01770019872" class="call-btn"><i class="fas fa-phone"></i> কল করুন - 01770019872</a>
      </div>
    </div>
  `;

  container.innerHTML = html;

  // Thumbnail click
  document.querySelectorAll('.thumb-wrapper').forEach(el => {
    el.addEventListener('click', function() {
      const imgSrc = this.dataset.img;
      document.getElementById('mainProductImage').src = imgSrc;
      document.querySelectorAll('.thumb-wrapper').forEach(t => t.classList.remove('active-thumb'));
      this.classList.add('active-thumb');
    });
  });

  // Update total on load
  updateTotal();

  // Submit order
  document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);
}

window.changeQty = function(step) {
  const input = document.getElementById('productQty');
  if (!input) return;
  let val = parseInt(input.value) || 1;
  val = Math.max(1, Math.min(99, val + step));
  input.value = val;
  currentQty = val;
  updateTotal();
};

function updateTotal() {
  const input = document.getElementById('productQty');
  if (!input || !selectedProduct) return;
  const qty = parseInt(input.value) || 1;
  const total = qty * selectedProduct.price;
  const display = document.getElementById('totalPriceDisplay');
  if (display) display.textContent = `৳ ${total}`;
  const cartCount = document.getElementById('cartCount');
  if (cartCount) cartCount.textContent = qty;
}

async function submitOrder() {
  if (!selectedProduct) {
    alert('পণ্য নির্বাচন করুন!');
    return;
  }

  const name = document.getElementById('orderName').value.trim();
  const phone = document.getElementById('orderPhone').value.trim();
  const address = document.getElementById('orderAddress').value.trim();
  const qty = parseInt(document.getElementById('productQty').value) || 1;
  const total = qty * selectedProduct.price;

  if (!name || !phone || !address) {
    alert('দয়া করে নাম, মোবাইল এবং ঠিকানা পূরণ করুন!');
    return;
  }

  try {
    await addDoc(collection(db, 'orders'), {
      productId: selectedProduct.docId,
      productName: selectedProduct.name,
      price: selectedProduct.price,
      discount: selectedProduct.discount || 0,
      qty: qty,
      total: total,
      name: name,
      phone: phone,
      address: address,
      district: 'নেই',
      upazila: 'নেই',
      thana: 'নেই',
      union: 'নেই',
      date: new Date().toLocaleString('bn-BD'),
      createdAt: serverTimestamp()
    });
    window.location.href = "success.html";
  } catch (err) {
    alert('❌ অর্ডার করতে সমস্যা হয়েছে');
    console.error(err);
  }
}

});
