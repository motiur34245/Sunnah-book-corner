<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Safe Bd - চেকআউট</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --primary: #b8860b;
      --primary-dark: #9c6f00;
      --primary-light: #d4a040;
      --bg: #f8f9fc;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --gray: #6b7280;
      --shadow: 0 8px 30px rgba(0,0,0,0.08);
      --radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --gray: #94a3b8;
      --shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: var(--transition);
      padding: 0;
      overflow-x: hidden;
    }

    /* ===== CLOSE BUTTON ===== */
    .close-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      background: var(--card-bg);
      color: var(--text);
      text-decoration: none;
      font-size: 22px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 9999;
      transition: var(--transition);
      border: none;
      cursor: pointer;
    }
    .close-btn:hover { transform: scale(1.08); background: var(--primary); color: #fff; }

    /* ===== HEADER ===== */
    .landing-header {
      background: linear-gradient(135deg, #1a1a2e, #2d2d44);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .landing-header .logo {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .landing-header .logo span { color: var(--primary); }
    .landing-header .logo i { color: var(--primary); font-size: 24px; }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ===== LOADING ===== */
    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }
    .loading-spinner i {
      font-size: 48px;
      color: var(--primary);
      animation: spin 1s linear infinite;
    }
    .loading-spinner p {
      color: var(--gray);
      font-size: 16px;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    /* ===== PRODUCT NOT FOUND ===== */
    .not-found {
      text-align: center;
      padding: 80px 20px;
    }
    .not-found i {
      font-size: 64px;
      color: var(--primary);
      display: block;
      margin-bottom: 16px;
    }
    .not-found h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .not-found p {
      color: var(--gray);
      margin-bottom: 20px;
    }
    .not-found .btn-home {
      display: inline-block;
      padding: 12px 32px;
      background: var(--primary);
      color: #fff;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }
    .not-found .btn-home:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(184,134,11,0.3); }

    /* ===== PRODUCT IMAGE ===== */
    .product-image-wrapper {
      width: 100%;
      aspect-ratio: 1/1;
      background: #f8f9fa;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      position: relative;
    }
    .product-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .discount-badge-landing {
      position: absolute;
      top: 14px;
      right: 14px;
      background: linear-gradient(135deg, var(--primary), #e60000);
      color: #fff;
      padding: 6px 14px;
      font-weight: 700;
      border-radius: 50px;
      font-size: 0.75rem;
      box-shadow: 0 4px 12px rgba(184,134,11,0.3);
      z-index: 2;
    }

    /* ===== THUMBNAIL GALLERY ===== */
    .thumb-gallery {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 8px 0 16px;
    }
    .thumb-gallery .thumb {
      width: 70px;
      height: 70px;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #e5e7eb;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9fa;
    }
    .thumb-gallery .thumb:hover { border-color: var(--primary); transform: scale(1.05); }
    .thumb-gallery .thumb.active { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(184,134,11,0.2); }
    .thumb-gallery .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== PRODUCT INFO ===== */
    .product-title {
      font-size: 24px;
      font-weight: 700;
      margin: 8px 0;
    }
    .product-price {
      font-size: 28px;
      font-weight: 900;
      color: #e60000;
      margin: 6px 0;
    }
    .product-price .old {
      font-size: 18px;
      color: var(--gray);
      text-decoration: line-through;
      margin-left: 10px;
      font-weight: 400;
    }
    .product-rating {
      color: #f59e0b;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .product-rating span {
      color: var(--gray);
      font-size: 13px;
    }

    .product-desc {
      background: var(--bg);
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      margin: 12px 0 16px;
      white-space: pre-line;
    }
    .product-desc li {
      list-style: none;
      padding: 4px 0;
    }
    .product-desc li i {
      color: var(--primary);
      margin-right: 8px;
    }

    /* ===== CHECKOUT BOX ===== */
    .checkout-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 16px;
      margin: 10px 0;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .checkout-box .delivery-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .qty-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0;
    }
    .qty-row label { font-weight: 600; font-size: 15px; }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .qty-control button {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid #e5e7eb;
      background: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }
    .qty-control button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .qty-control input {
      width: 56px;
      padding: 6px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 17px;
      text-align: center;
      font-weight: 700;
      background: #fff;
      color: var(--text);
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-size: 19px;
      font-weight: 700;
      border-top: 2px dashed #e5e7eb;
      padding-top: 12px;
      margin-top: 8px;
    }
    .total-row .total-price { color: #e60000; font-size: 22px; }

    /* ===== ORDER FORM ===== */
    .order-form-container {
      margin-top: 14px;
      padding: 16px;
      background: var(--bg);
      border-radius: 12px;
    }
    .order-form-container h3 {
      color: var(--primary);
      margin-bottom: 12px;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .order-form-container input,
    .order-form-container textarea,
    .order-form-container select {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 10px;
      background: #fff;
      color: var(--text);
      font-family: inherit;
      transition: var(--transition);
    }
    .order-form-container input:focus,
    .order-form-container textarea:focus,
    .order-form-container select:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 4px rgba(184,134,11,0.08);
    }
    .order-form-container textarea { min-height: 65px; resize: vertical; }

    .btn-submit-order {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-submit-order:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,197,94,0.3); }

    /* ===== EXTRA BUTTONS ===== */
    .extra-order-buttons {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .extra-order-buttons a {
      text-decoration: none;
      padding: 13px;
      border-radius: 50px;
      font-weight: 600;
      text-align: center;
      font-size: 14px;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: var(--transition);
    }
    .extra-order-buttons a:hover { transform: scale(1.02); }
    .wa-btn { background: #25d366; }
    .ms-btn { background: #1877f2; }
    .call-btn { background: #0f9d8a; }

    /* ===== FOOTER ===== */
    .landing-footer {
      background: linear-gradient(135deg, #1a1a2e, #2d2d44);
      color: #fff;
      padding: 20px 16px;
      margin-top: 16px;
      text-align: center;
      border-radius: var(--radius);
    }
    .landing-footer p { font-size: 13px; color: #888; }
    .landing-footer a { color: var(--primary); text-decoration: none; }

    .theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--card-bg);
      color: var(--text);
      border: 2px solid var(--primary);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: var(--shadow);
      z-index: 99;
      transition: var(--transition);
    }
    .theme-toggle:hover { transform: scale(1.1) rotate(20deg); background: var(--primary); color: #fff; }

    @media (max-width: 480px) {
      .product-title { font-size: 20px; }
      .product-price { font-size: 24px; }
      .thumb-gallery .thumb { width: 55px; height: 55px; }
      .container { padding: 12px; }
    }
  </style>
</head>
<body>

<!-- ===== CLOSE BUTTON ===== -->
<button class="close-btn" onclick="window.location.href='index.html'">✕</button>

<!-- ===== HEADER ===== -->
<header class="landing-header">
  <div class="logo"><i class="fas fa-shield-alt"></i> Safe<span>Bd</span></div>
</header>

<!-- ===== MAIN ===== -->
<div class="container" id="mainContainer">

  <!-- Loading Spinner -->
  <div class="loading-spinner" id="loadingSpinner">
    <i class="fas fa-spinner"></i>
    <p>পণ্য লোড হচ্ছে...</p>
  </div>

  <!-- Product Content (Hidden by default) -->
  <div id="productContent" style="display:none;">

    <!-- Product Image -->
    <div class="product-image-wrapper">
      <img id="mainImage" src="" alt="Product Image">
      <div class="discount-badge-landing" id="discountBadge">-0%</div>
    </div>

    <!-- Thumbnail Gallery -->
    <div class="thumb-gallery" id="thumbGallery"></div>

    <!-- Product Info -->
    <h1 class="product-title" id="productTitle"></h1>
    <div class="product-price" id="productPrice">৳ ০ <span class="old" id="oldPrice"></span></div>
    <div class="product-rating">
      <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
      <span>(১২ জন ক্রেতা)</span>
    </div>
    <div class="product-desc" id="productDesc"></div>

    <!-- Checkout Box -->
    <div class="checkout-box">
      <div class="delivery-badge"><i class="fas fa-truck"></i> হোম ডেলিভারি</div>
      <div class="qty-row">
        <label>পরিমাণ:</label>
        <div class="qty-control">
          <button onclick="changeQty(-1)">−</button>
          <input type="number" id="productQty" value="1" min="1" max="99" readonly>
          <button onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div class="total-row">
        <span>মোট দাম:</span>
        <span class="total-price" id="totalPriceDisplay">৳ ০</span>
      </div>
    </div>

    <!-- Order Form -->
    <div class="order-form-container">
      <h3><i class="fas fa-clipboard-list"></i> অর্ডার ফর্ম</h3>
      <input type="text" id="orderName" placeholder="আপনার নাম *">
      <input type="tel" id="orderPhone" placeholder="মোবাইল নম্বর *">
      <input type="text" id="orderDistrict" placeholder="জেলা *">
      <input type="text" id="orderUpazila" placeholder="উপজেলা *">
      <input type="text" id="orderThana" placeholder="থানা *">
      <input type="text" id="orderUnion" placeholder="ইউনিয়ন / ওয়ার্ড *">
      <textarea id="orderAddress" placeholder="বিস্তারিত ঠিকানা *"></textarea>
      <button class="btn-submit-order" id="submitOrderBtn">
        <i class="fas fa-check-circle"></i> অর্ডার কনফার্ম করুন
      </button>
    </div>

    <!-- Extra Order Buttons -->
    <div class="extra-order-buttons">
      <a href="https://wa.me/8801770019872" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i> WhatsApp এ অর্ডার করুন</a>
      <a href="https://m.me/yourpageusername" target="_blank" class="ms-btn"><i class="fab fa-facebook-messenger"></i> Messenger এ অর্ডার করুন</a>
      <a href="tel:01770019872" class="call-btn"><i class="fas fa-phone"></i> কল করুন - 01770019872</a>
    </div>

    <!-- Footer -->
    <div class="landing-footer">
      <p>© 2026 Safe Bd. সর্বস্বত্ব সংরক্ষিত | <a href="#">প্রাইভেসি পলিসি</a></p>
    </div>
  </div>

  <!-- Product Not Found -->
  <div id="notFoundContent" style="display:none;">
    <div class="not-found">
      <i class="fas fa-exclamation-circle"></i>
      <h2>পণ্যটি পাওয়া যায়নি</h2>
      <p>আপনি যে পণ্যটি খুঁজছেন তা আমাদের ডাটাবেসে নেই।</p>
      <a href="index.html" class="btn-home"><i class="fas fa-home"></i> হোমে যান</a>
    </div>
  </div>
</div>

<!-- ===== THEME TOGGLE ===== -->
<button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  doc, 
  getDoc, 
  collection, 
  addDoc, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCa3qjuHUkFJwOEv1Cbp-E0AIkihCW4zKY",
  authDomain: "sunnah-book-corner.firebaseapp.com",
  projectId: "sunnah-book-corner",
  storageBucket: "sunnah-book-corner.firebasestorage.app",
  messagingSenderId: "728093683205",
  appId: "1:728093683205:web:198063ce6b85f07adeb66c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Get Product ID from URL
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get("id");

let currentProduct = null;
let currentPrice = 0;
let productImages = [];

// ===== THEME TOGGLE =====
document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  const icon = document.querySelector('#themeToggle i');
  if (icon) icon.className = current === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
});

// ===== LOAD PRODUCT =====
async function loadProduct() {
  // Show loading spinner
  document.getElementById('loadingSpinner').style.display = 'flex';
  document.getElementById('productContent').style.display = 'none';
  document.getElementById('notFoundContent').style.display = 'none';

  if (!productId) {
    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('notFoundContent').style.display = 'block';
    return;
  }

  try {
    const docRef = doc(db, "products", productId);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('notFoundContent').style.display = 'block';
      return;
    }

    const p = docSnap.data();
    currentProduct = p;
    currentPrice = p.price || 490;

    // Get images
    productImages = [];
    if (p.images && Array.isArray(p.images) && p.images.length) {
      productImages = p.images;
    } else if (p.image) {
      productImages = [p.image];
    } else {
      productImages = ['https://raw.githubusercontent.com/motiur34245/Sunnah-book-corner/main/photo_2026-04-02_13-02-15%20(2).jpg'];
    }

    // Update UI
    const oldPrice = Math.round((p.price || 490) / (1 - (p.discount || 0) / 100));

    // Title
    document.getElementById('productTitle').textContent = p.name || 'বেবি সেফটি ড্রয়ার লক';

    // Main Image
    document.getElementById('mainImage').src = productImages[0] || '';

    // Price
    document.getElementById('productPrice').innerHTML = `৳ ${p.price || 490} <span class="old">৳ ${oldPrice}</span>`;
    document.getElementById('oldPrice').textContent = `৳ ${oldPrice}`;

    // Discount Badge
    if (p.discount && p.discount > 0) {
      document.getElementById('discountBadge').textContent = `-${p.discount}%`;
      document.getElementById('discountBadge').style.display = 'block';
    } else {
      document.getElementById('discountBadge').style.display = 'none';
    }

    // Description
    document.getElementById('productDesc').innerHTML = p.description || '';

    // Thumbnails
    const gallery = document.getElementById('thumbGallery');
    gallery.innerHTML = '';
    productImages.forEach((img, idx) => {
      const thumb = document.createElement('div');
      thumb.className = 'thumb' + (idx === 0 ? ' active' : '');
      thumb.innerHTML = `<img src="${img}" alt="Thumb">`;
      thumb.addEventListener('click', () => {
        document.getElementById('mainImage').src = img;
        gallery.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
      });
      gallery.appendChild(thumb);
    });

    // Hide loading, show content
    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('productContent').style.display = 'block';

    // Update total
    updateTotal();

  } catch (error) {
    console.error('Error loading product:', error);
    document.getElementById('loadingSpinner').style.display = 'none';
    document.getElementById('notFoundContent').style.display = 'block';
    document.querySelector('#notFoundContent .not-found p').textContent = error.message;
  }
}

// ===== QUANTITY =====
function updateTotal() {
  const qty = parseInt(document.getElementById('productQty').value) || 1;
  const total = qty * (currentPrice || 490);
  document.getElementById('totalPriceDisplay').textContent = `৳ ${total}`;
}

window.changeQty = function(step) {
  const input = document.getElementById('productQty');
  let val = parseInt(input.value) || 1;
  val = Math.max(1, Math.min(99, val + step));
  input.value = val;
  updateTotal();
};

// ===== ORDER SUBMIT =====
document.getElementById('submitOrderBtn').addEventListener('click', async () => {
  if (!currentProduct) {
    alert('পণ্য নির্বাচন করুন!');
    return;
  }

  const name = document.getElementById('orderName').value.trim();
  const phone = document.getElementById('orderPhone').value.trim();
  const district = document.getElementById('orderDistrict').value.trim();
  const upazila = document.getElementById('orderUpazila').value.trim();
  const thana = document.getElementById('orderThana').value.trim();
  const union = document.getElementById('orderUnion').value.trim();
  const address = document.getElementById('orderAddress').value.trim();
  const qty = parseInt(document.getElementById('productQty').value) || 1;
  const total = qty * (currentPrice || 490);

  if (!name || !phone || !address) {
    alert('দয়া করে নাম, মোবাইল এবং ঠিকানা পূরণ করুন!');
    return;
  }

  try {
    await addDoc(collection(db, 'orders'), {
      productId: productId,
      productName: currentProduct.name || 'বেবি সেফটি ড্রয়ার লক',
      price: currentPrice || 490,
      discount: currentProduct.discount || 0,
      qty: qty,
      total: total,
      name: name,
      phone: phone,
      district: district || 'নেই',
      upazila: upazila || 'নেই',
      thana: thana || 'নেই',
      union: union || 'নেই',
      address: address,
      date: new Date().toLocaleString('bn-BD'),
      createdAt: serverTimestamp()
    });

    alert(`✅ অর্ডার সফল!\n\nপণ্য: ${currentProduct.name}\nপরিমাণ: ${qty} পিস\nমোট: ৳ ${total}\n\nআপনার ঠিকানায় শীঘ্রই ডেলিভারি দেওয়া হবে।`);
    window.location.href = "success.html";

  } catch (err) {
    alert('❌ অর্ডার করতে সমস্যা হয়েছে');
    console.error(err);
  }
});

// ===== INIT =====
loadProduct();
</script>
