<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Order Page</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f8f8f8;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
}

img{
  width:100%;
  max-height:420px;
  object-fit:cover;
  border-radius:10px;
}

h1{
  font-size:22px;
  margin:15px 0;
}

.price{
  font-size:26px;
  font-weight:bold;
  color:#d60000;
  margin:10px 0;
}

.desc{
  white-space:pre-line;
  margin-top:15px;
  font-size:15px;
}

form{
  margin-top:25px;
}

label{
  display:block;
  margin-top:15px;
  font-weight:600;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
}

button{
  margin-top:20px;
  padding:15px;
  width:100%;
  background:linear-gradient(45deg,#d60000,#ff9900);
  border:none;
  color:white;
  font-size:18px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Loading...</h1>
  <img id="image" src="">
  <div class="price" id="price"></div>
  <div class="desc" id="desc"></div>

  <h2 style="margin-top:30px;">অর্ডার কনফার্ম করুন</h2>

  <form id="orderForm">

    <label>আপনার নাম *</label>
    <input type="text" id="name" required>

    <label>মোবাইল নম্বর *</label>
    <input type="tel" id="phone" required>

    <label>জেলা *</label>
    <input type="text" id="district" required>

    <label>উপজেলা *</label>
    <input type="text" id="upazila" required>

    <label>থানা *</label>
    <input type="text" id="thana" required>

    <label>ইউনিয়ন / ওয়ার্ড *</label>
    <input type="text" id="union" required>

    <label>বিস্তারিত ঠিকানা *</label>
    <textarea id="address" rows="3" required></textarea>

    <button type="submit">অর্ডার প্লেস করুন</button>

  </form>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  doc, 
  getDoc, 
  collection, 
  addDoc, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCa3qjuHUkFJwOEv1Cbp-E0AIkihCW4zKY",
  authDomain: "sunnah-book-corner.firebaseapp.com",
  projectId: "sunnah-book-corner",
  storageBucket: "sunnah-book-corner.firebasestorage.app",
  messagingSenderId: "728093683205",
  appId: "1:728093683205:web:198063ce6b85f07adeb66c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get("id");

if(!productId){
  document.body.innerHTML = "<h2>Product ID পাওয়া যায়নি</h2>";
}

let currentProduct = null;

const docRef = doc(db, "products", productId);

getDoc(docRef).then((docSnap) => {

  if (!docSnap.exists()) {
    document.body.innerHTML = "<h2>Product Not Found</h2>";
    return;
  }

  const p = docSnap.data();
  currentProduct = p;

  document.getElementById("title").innerText = p.name;
  document.getElementById("image").src = p.image;
  document.getElementById("price").innerText = "৳ " + p.price;
  document.getElementById("desc").innerText = p.description;

});

document.getElementById("orderForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  if(!currentProduct){
    alert("Product load হয়নি");
    return;
  }

  const order = {
    productId: productId,
    productName: currentProduct.name,
    price: currentProduct.price,
    discount: currentProduct.discount || 0,
    name: document.getElementById('name').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    district: document.getElementById('district').value.trim(),
    upazila: document.getElementById('upazila').value.trim(),
    thana: document.getElementById('thana').value.trim(),
    union: document.getElementById('union').value.trim(),
    address: document.getElementById('address').value.trim(),
    date: new Date().toLocaleString('bn-BD'),
    createdAt: serverTimestamp()
  };

  try{
    await addDoc(collection(db, "orders"), order);
    alert("অর্ডার সফলভাবে গ্রহণ করা হয়েছে!");
    e.target.reset();
  }catch(error){
    alert("অর্ডার করতে সমস্যা হয়েছে");
    console.error(error);
  }

});

</script>

</body>
  </html>
