<style>

<body>

<div class="container">

  <h2 style="margin-top:30px;">অর্ডার কনফার্ম করুন</h2>

 <label>আপনার নাম *</label>

   <label>মোবাইল নম্বর *</label>

</label>
    <select id="district" required>

  <option value="4 পিস - 490৳">💰 ৪ পিস – ৪৯০৳</option>

 <!--<label>উপজেলা *</label>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  doc, 
  getDoc, 
  collection, 
  addDoc, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCa3qjuHUkFJwOEv1Cbp-E0AIkihCW4zKY",
  authDomain: "sunnah-book-corner.firebaseapp.com",
  projectId: "sunnah-book-corner",
  storageBucket: "sunnah-book-corner.firebasestorage.app",
  messagingSenderId: "728093683205",
  appId: "1:728093683205:web:198063ce6b85f07adeb66c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get("id");

let currentProduct = null;

/* ================= LOAD PRODUCT ================= */

if(productId){

  const docRef = doc(db, "products", productId);

  getDoc(docRef).then((docSnap) => {

    if (!docSnap.exists()) {
      document.body.innerHTML = "<h2>Product Not Found</h2>";
      return;
    }

    const p = docSnap.data();
    currentProduct = p;

    document.getElementById("title").innerText = p.name;
    document.getElementById("image").src = p.image;
    document.getElementById("price").innerText = "৳ " + p.price;
    document.getElementById("desc").innerText = p.description || "";

  });

}

/* ================= ORDER SUBMIT ================= */

document.getElementById("orderForm")
.addEventListener("submit", async (e)=>{

  e.preventDefault();

  if(!currentProduct){
    alert("Product load হয়নি");
    return;
  }

  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const address = document.getElementById('address').value.trim();
const district = document.getElementById('district').value.trim();
  if(!name || !phone || !address){
    alert("নাম, মোবাইল এবং ঠিকানা অবশ্যই পূরণ করুন");
    return;
  }

  const order = {
    productId: productId,
    productName: currentProduct.name,
    price: currentProduct.price,
    discount: currentProduct.discount || 0,
    name: name,
    phone: phone,
    district: district,
    upazila: "নেই",
    thana: "নেই",
    union: "নেই",
    address: address,
    date: new Date().toLocaleString('bn-BD'),
    createdAt: serverTimestamp()
  };

  try{
    await addDoc(collection(db, "orders"), order);

/* Facebook Purchase Event */
fbq('track', 'Purchase', {
value: currentProduct.price,
currency: 'BDT'
});

    window.location.href = "success.html";
    e.target.reset();
  }
  catch(error){
    console.error(error);
    alert("অর্ডার করতে সমস্যা হয়েছে");
  }

});

</script>


</body>
